<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/kwu-pegasus.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KWU PEGASUS</title>
    <style>
      :root {
        /* ── 메인 팔레트 ── */
        --main-800: #011126;
        --main-500: #A6926D;
        --main-400: #C0AC87;
        --main-300: #D9C5A0;

        /* ── 기본 텍스트 ── */
        --text-100: #ffffff;

        /* ── 강조색 ── */
        --color-red:          #f07070;
        --color-blue:         #6fa3f5;
        --color-green:        #6dc87a;
        --color-purple:       #c87adc;
        --color-yellow:       #f5a623;
        --color-error:        #e05c5c;
        --color-gold-retired: #c9a227;

        /* ── 배경 ── */
        --bg-popup:         #0d1f35;
        --bg-table-sticky:  #0a1929;
        --bg-calendar-cell: rgba(30, 24, 18, 0.85);

        /* ── 서페이스 ── */
        --surface-faint:    rgba(255, 255, 255, 0.03);
        --surface-card:     rgba(255, 255, 255, 0.04);
        --surface-hover:    rgba(255, 255, 255, 0.05);
        --surface-input:    rgba(255, 255, 255, 0.07);
        --surface-elevated: rgba(255, 255, 255, 0.08);

        /* ── 테두리 ── */
        --border-faint:   rgba(255, 255, 255, 0.06);
        --border-dim:     rgba(255, 255, 255, 0.10);
        --border-default: rgba(255, 255, 255, 0.12);
        --border-input:   rgba(255, 255, 255, 0.15);
        --border-medium:  rgba(255, 255, 255, 0.20);
        --border-strong:  rgba(255, 255, 255, 0.25);
        --border-hover:   rgba(255, 255, 255, 0.35);

        /* ── 텍스트 불투명도 ── */
        --text-secondary:   rgba(255, 255, 255, 0.80);
        --text-tertiary:    rgba(255, 255, 255, 0.55);
        --text-muted:       rgba(255, 255, 255, 0.45);
        --text-meta:        rgba(255, 255, 255, 0.35);
        --text-dim:         rgba(255, 255, 255, 0.30);
        --text-placeholder: rgba(255, 255, 255, 0.25);
        --text-ghost:       rgba(255, 255, 255, 0.20);

        /* ── 일정 타입 색상 ── */
        --event-training:        #6dc87a;
        --event-training-bg:     rgba(109, 200, 122, 0.16);
        --event-training-border: rgba(109, 200, 122, 0.38);
        --event-meeting:         #6fa3f5;
        --event-meeting-bg:      rgba(111, 163, 245, 0.16);
        --event-meeting-border:  rgba(111, 163, 245, 0.38);
        --event-events:          #f5c842;
        --event-events-bg:       rgba(245, 200, 66, 0.16);
        --event-events-border:   rgba(245, 200, 66, 0.38);
        --event-etc:             #c87adc;
        --event-etc-bg:          rgba(200, 122, 220, 0.16);
        --event-etc-border:      rgba(200, 122, 220, 0.38);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
